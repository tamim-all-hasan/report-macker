<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Report Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { 
    background-color: #0a0a0a; 
    color: #e0e0e0; 
    font-family: 'Segoe UI', Arial, sans-serif; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 40px 20px;
}
.controls {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-bottom: 30px;
    max-width: 400px;
}
input { 
    padding: 12px; 
    border-radius: 8px; 
    border: 1px solid #333; 
    background: #1a1a1a; 
    color: white; 
    outline: none;
}
input:focus { border-color: #00ff96; }

#report-card {
    width: 360px; 
    background-color: #000000; 
    border: 1px solid #222;
    padding: 40px 30px; 
    text-align: center;
}
.rocket { font-size: 20px; margin-bottom: 10px; }
.divider { color: #444; margin: 15px 0; font-weight: bold; }
.label { color: #888; font-size: 14px; text-transform: uppercase; }
.value { font-size: 18px; margin-bottom: 12px; }
.pair { font-size: 26px; font-weight: 800; color: #fff; margin: 10px 0; }

.profit-box { 
    margin-top: 20px; 
    padding: 15px;
    border: 1px dashed #00ff96;
    border-radius: 8px;
}
.profit-text { font-size: 28px; font-weight: bold; }

.btn-download {
    margin-top: 30px; 
    padding: 15px 40px; 
    background: linear-gradient(45deg, #00ff96, #00cc7a); 
    border: none; 
    border-radius: 50px; 
    cursor: pointer; 
    font-weight: bold;
    font-size: 16px;
    color: #000;
}
</style>
</head>

<body>

<h2>🚀 Report Generator</h2>

<div class="controls">
    <input type="text" id="exInput" placeholder="Exchange (MEXC)" oninput="updateReport()">
    <input type="text" id="pairInput" placeholder="Pair (BTC/USDT)" oninput="updateReport()">
    <input type="number" id="entryInput" placeholder="Entry Price" oninput="updateReport()" step="any">
    <input type="number" id="tpInput" placeholder="Take Profit" oninput="updateReport()" step="any">
</div>

<div id="report-card">
    <div class="rocket">🚀 TRADE UPDATE</div>
    <div class="divider">━━━━━━━━━━━━━━━━━━━</div>

    <div class="label">Exchange</div>
    <div class="value" id="displayEx">MEXC</div>

    <div class="label">Market</div>
    <div class="value">Spot</div>

    <div class="pair" id="displayPair">BTC/USDT</div>

    <div class="divider">━━━━━━━━━━━━━━━━━━━</div>

    <div class="label">Entry Price</div>
    <div class="value" id="displayEntry">0</div>

    <div class="label">Take Profit</div>
    <div class="value" id="displayTP">0</div>

    <div class="profit-box">
        <div id="profitStatus">Waiting...</div>
        <div class="profit-text" id="displayProfit">0%</div>
    </div>

    <div class="divider">━━━━━━━━━━━━━━━━━━━</div>
</div>

<button class="btn-download" onclick="downloadImage()">⬇️ Download Image</button>

<script>
function updateReport() {
    const ex = document.getElementById('exInput').value || 'MEXC';
    const pair = document.getElementById('pairInput').value || 'BTC/USDT';

    const entryVal = document.getElementById('entryInput').value;
    const tpVal = document.getElementById('tpInput').value;

    const entry = entryVal ? parseFloat(entryVal) : 0;
    const tp = tpVal ? parseFloat(tpVal) : 0;

    let profit = 0;
    let status = "Waiting...";
    let color = "#888";

    if (entry > 0 && tp > 0) {
        profit = ((tp - entry) / entry) * 100;

        if (profit >= 0) {
            status = "✅ Take Profit Hit";
            color = "#00ff96";
        } else {
            status = "❌ Loss";
            color = "#ff4d4d";
        }
    }

    document.getElementById('displayEx').innerText = ex;
    document.getElementById('displayPair').innerText = pair;
    document.getElementById('displayEntry').innerText = entry;
    document.getElementById('displayTP').innerText = tp;

    document.getElementById('displayProfit').innerText = profit.toFixed(2) + "%";
    document.getElementById('displayProfit').style.color = color;
    document.getElementById('profitStatus').innerText = status;
    document.getElementById('profitStatus').style.color = color;
}

async function downloadImage() {
    const card = document.getElementById("report-card");
    const btn = document.querySelector(".btn-download");

    btn.innerText = "Generating...";

    try {
        const canvas = await html2canvas(card, {
            backgroundColor: "#000",
            scale: 3,
            useCORS: true
        });

        const image = canvas.toDataURL("image/png");

        const link = document.createElement("a");
        link.href = image;
        link.download = "Trade_Report.png";
        link.target = "_blank";

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        btn.innerText = "⬇️ Download Image";
    } catch (e) {
        alert("Download Failed!");
        console.error(e);
        btn.innerText = "⬇️ Download Image";
    }
}
</script>

</body>
</html>
